<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食谱列表应用</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>食谱列表</h1>
        <div class="add-recipe">
            <input type="text" id="recipe-name" placeholder="食谱名称" required>
            <input type="text" id="recipe-description" placeholder="食谱描述" required>
            <button id="add-btn">添加食谱</button>
        </div>
        <ul id="recipe-list"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
